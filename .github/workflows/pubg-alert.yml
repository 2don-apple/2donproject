name: PUBG Discord Alert

on:
  schedule:
    # 매일 KST 10:10 실행
    - cron: "10 1 * * *"

  workflow_dispatch:
    inputs:
      test_mode:
        description: "PUBG 알림 테스트 모드"
        required: false
        default: "false"
      test_kinds:
        description: "테스트 카테고리"
        required: false
        default: "notice,patch_notes,labs,dev_notes,event,map_rotation"

permissions:
  contents: write

jobs:
  pubg-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Send PUBG alerts
        env:
          PUBG_ALERT_CONFIG_JSON: ${{ secrets.PUBG_ALERT_CONFIG_JSON }}
          PUBG_ALERT_TEST_MODE: ${{ github.event.inputs.test_mode }}
          PUBG_ALERT_TEST_KINDS: ${{ github.event.inputs.test_kinds }}
        run: |
          python scripts/pubg_alert.py

      - name: Commit sent state
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.test_mode != 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/pubg_sent.json
          git diff --cached --quiet || git commit -m "Update PUBG sent state"
          git push
