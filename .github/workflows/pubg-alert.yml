name: PUBG Discord Alert

on:
  schedule:
    # 매일 KST 10:10 실행
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pubg-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Send PUBG alerts
        env:
          PUBG_ALERT_CONFIG_JSON: ${{ secrets.PUBG_ALERT_CONFIG_JSON }}
        run: |
          python scripts/pubg_alert.py

      - name: Commit sent state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/pubg_sent.json
          git diff --cached --quiet || git commit -m "Update PUBG sent state"
          git push
