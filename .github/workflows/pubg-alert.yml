name: PUBG Discord Alert

on:
  schedule:
    # 매일 KST 10:10 실행
    - cron: "10 1 * * *"

  workflow_dispatch:
    inputs:
      test_mode:
        description: "PUBG 알림 테스트 모드"
        required: false
        default: "false"
      test_kinds:
        description: "테스트 카테고리"
        required: false
        default: "notice,patch_notes,labs,dev_notes,event,map_rotation"

permissions:
  contents: write

jobs:
  pubg-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Debug PUBG config summary
        env:
          PUBG_ALERT_CONFIG_JSON: ${{ secrets.PUBG_ALERT_CONFIG_JSON }}
        run: |
          python - <<'PY'
          import os, json

          raw = os.getenv("PUBG_ALERT_CONFIG_JSON", "")
          print("PUBG_ALERT_CONFIG_JSON length:", len(raw))

          if not raw.strip():
              print("CONFIG IS EMPTY")
              raise SystemExit(0)

          try:
              data = json.loads(raw)
          except Exception as e:
              print("CONFIG JSON ERROR:", type(e).__name__, e)
              raise SystemExit(0)

          guilds = data.get("guilds") or {}
          print("guild count:", len(guilds))

          for gid, cfg in guilds.items():
              if not isinstance(cfg, dict):
                  print(f"guild={gid} cfg=NOT_DICT")
                  continue

              webhook = str(cfg.get("webhook_url") or "").strip()
              print(
                  f"guild={gid} "
                  f"enabled={cfg.get('enabled')} "
                  f"webhook={'YES' if webhook.startswith('https://') else 'NO'} "
                  f"channel_id={cfg.get('channel_id')} "
                  f"channel_name={cfg.get('channel_name')} "
                  f"types={cfg.get('types')}"
              )
          PY

      - name: Send PUBG alerts
        env:
          PUBG_ALERT_CONFIG_JSON: ${{ secrets.PUBG_ALERT_CONFIG_JSON }}
          PUBG_ALERT_TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          PUBG_ALERT_TEST_KINDS: ${{ github.event.inputs.test_kinds || 'notice,patch_notes,labs,dev_notes,event,map_rotation' }}
        run: |
          python scripts/pubg_alert.py

      - name: Commit sent state
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.test_mode != 'true' }}
        run: |
          if [ ! -f data/pubg_sent.json ]; then
            echo "data/pubg_sent.json not found. Skip commit."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/pubg_sent.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update PUBG sent state"
          git push
